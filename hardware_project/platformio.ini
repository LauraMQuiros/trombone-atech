; PlatformIO Project Configuration File
; Project: hardware_project
; Platform: ESP32-S3
; Generated by Atech Hardware Platform

[env:esp32]
platform = espressif32@~6.4.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800

; Upload flags to ensure clean bootloader entry and prevent serial corruption
upload_flags =
    --before=default_reset
    --after=hard_reset

; ESP32-S3 USB settings - CRITICAL for USB serial to work!
; -I flags let PlatformIO find athera module headers without lib_extra_dirs
; (lib_extra_dirs breaks framework library discovery for WiFi/WiFiClientSecure)
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Ilib/athera_modules
    -Ilib/athera_drivers/src

; External library dependencies (all modules, LDF selects what to compile)
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    adafruit/Adafruit NeoPixel@^1.12.0
    madhephaestus/ESP32Encoder@^0.11.7
    adafruit/Adafruit ST7735 and ST7789 Library
    adafruit/Adafruit GFX Library@^1.11.5
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit SI1145 Library@^1.2.0
    adafruit/Adafruit Unified Sensor@^1.1.9
    sparkfun/SparkFun VL53L5CX Arduino Library
    links2004/WebSockets@^2.6.1
    bblanchon/ArduinoJson
    adafruit/Adafruit NeoPixel